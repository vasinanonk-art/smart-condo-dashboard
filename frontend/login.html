<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login · Smart Condo Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/dashboard_auth.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="loginTitle">
      <div class="auth-brand"><span class="auth-mark">SC</span><div><strong>Smart Condo</strong><small>Dashboard 8090</small></div></div>
      <div class="auth-copy">
        <p class="auth-eyebrow">Protected access</p>
        <h1 id="loginTitle">Sign in to Dashboard</h1>
        <p>Use your configured dashboard account to continue.</p>
      </div>
      <div id="sessionMessage" class="auth-message info" hidden></div>
      <form id="loginForm" novalidate>
        <label>Username<input id="username" name="username" type="text" autocomplete="username" required autofocus></label>
        <label>Password<span class="password-wrap"><input id="password" name="password" type="password" autocomplete="current-password" required><button id="togglePassword" type="button" class="password-toggle" aria-label="Show password">Show</button></span></label>
        <div id="loginError" class="auth-message error" role="alert" hidden></div>
        <button id="loginButton" class="auth-button" type="submit"><span class="button-label">Login</span><span class="button-loading" hidden>Signing in…</span></button>
      </form>
    </section>
  </main>
  <script src="/assets/dashboard_login.js"></script>
</body>
</html>
